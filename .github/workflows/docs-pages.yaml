name: Docs and Pages

permissions:
  contents: read
  pages: write
  id-token: write

on:
  pull_request:
  push:
    branches:
      - feature/all-requested-features
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Install Dependencies
        run: uv sync --group dev

      - name: Validate screenshot harness
        run: uv run pytest tests/unit/test_docs_screenshots.py -q

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-pages:
    name: Deploy Pages
    if: github.event_name != 'pull_request'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v6.0.2
